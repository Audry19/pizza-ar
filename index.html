<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pizza AR Menu</title>

  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous"
          src="./external/xr/xr.js"
          async="true"
          data-preload-chunks="slam">
  </script>

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      touch-action: manipulation;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    #ui {
      position: fixed; inset: 0;
      z-index: 999;
      pointer-events: none;
    }
    #pizza-label {
      position: absolute;
      top: 28px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 18px; font-weight: bold;
      white-space: nowrap;
    }
    #ingredients {
      position: absolute;
      top: 82px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #ffd166;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px; white-space: nowrap;
    }
    #debug {
      position: absolute;
      top: 122px; left: 10px; right: 10px;
      background: rgba(0,0,0,0.85);
      color: #00ff88;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 11px; text-align: center;
    }
    #instructions {
      position: absolute;
      bottom: 140px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px; text-align: center;
      width: 85%; line-height: 1.5;
    }
    #btn-row {
      position: absolute;
      bottom: 54px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 14px;
      pointer-events: all;
    }
    .btn {
      color: white; border: none;
      padding: 15px 28px; border-radius: 40px;
      font-size: 15px; font-weight: bold;
      cursor: pointer; white-space: nowrap;
      touch-action: manipulation;
    }
    #move-btn   { background: #2b9348; }
    #switch-btn { background: #e63946; }
  </style>
</head>
<body>

  <div id="ui">
    <div id="pizza-label">Pepperoni Pizza</div>
    <div id="ingredients">Tomato sauce · Pepperoni · Mozzarella · Oregano</div>
    <div id="debug">⏳ Starting...</div>
    <div id="instructions">🔍 Move phone slowly over the table</div>
    <div id="btn-row">
      <button class="btn" id="move-btn"   onclick="startMove()">📍 Move</button>
      <button class="btn" id="switch-btn" onclick="switchPizza()">🍕 Switch</button>
    </div>
  </div>

  <!--
    ════════════════════════════════════════════════════════
    CRITICAL: This script must come BEFORE bundle.js.
    bundle.js calls XR8.run() which starts the pipeline.
    We must register our module BEFORE that happens
    so our onStart and onProcessCpu callbacks fire correctly.
    ════════════════════════════════════════════════════════
  -->
  <script>

    // ── State ─────────────────────────────────────────────
    const pizzas = [
      {
        name:        "Pepperoni Pizza",
        asset:       "assets/1.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano"
      },
      {
        name:        "BBQ Chicken Pizza",
        asset:       "assets/2.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers"
      },
      {
        name:        "Margherita Pizza",
        asset:       "assets/3.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex  = 0;
    let pizzaMesh     = null;   // THREE.Mesh — set by onProcessCpu
    let meshFixed     = false;  // true after MeshBasicMaterial applied
    let waitingToMove = false;
    let currentScale  = 2.0;   // start at 2x — bigger and more visible
    let lastPinchDist = null;

    const labelEl = document.getElementById("pizza-label");
    const ingEl   = document.getElementById("ingredients");
    const instrEl = document.getElementById("instructions");
    const debugEl = document.getElementById("debug");

    function dbg(msg) {
      console.log("[Pizza]", msg);
      debugEl.textContent = msg;
    }

    // ── Block double-tap zoom ─────────────────────────────
    let lastTap = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if (now - lastTap < 350) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // ── Register XR8 pipeline module ──────────────────────
    // We do this inside xrloaded which fires when xr.js is ready.
    // Because this script tag is BEFORE bundle.js, our handler
    // runs first — our module is registered before bundle.js
    // calls XR8.run(), so our callbacks are guaranteed to fire.

    window.addEventListener("xrloaded", () => {
      dbg("XR8 ready — registering module...");

      XR8.addCameraPipelineModule({
        name: "pizza-module",

        // ── onProcessCpu fires EVERY FRAME ────────────────
        // This is the most reliable hook in the XR8 pipeline.
        // We use it to find the pizza mesh (runs until found)
        // and to fix the lighting once.
        onProcessCpu: ({ frameStartResult }) => {

          // Once mesh is found and fixed, do nothing each frame
          if (meshFixed) return;

          // Try to get the Three.js scene
          let scene = null;
          try {
            const xs = XR8.Threejs.xrScene();
            scene = (xs && xs.scene) ? xs.scene : xs;
          } catch (e) {
            return; // not ready yet, try next frame
          }

          if (!scene || !scene.traverse) return;

          // Traverse scene looking for a mesh with a texture
          scene.traverse((obj) => {
            if (meshFixed) return;
            if (!obj.isMesh) return;
            if (!obj.material) return;
            if (!obj.material.map) return; // must have texture

            // Found the pizza plane!
            pizzaMesh = obj;
            dbg("✅ Mesh found — applying fixes...");

            // ── FIX 1: Lighting ───────────────────────────
            // Replace with MeshBasicMaterial.
            // This material ignores ALL scene lights entirely.
            // Pizza always shows its true colors.
            const tex = obj.material.map;

            obj.material = new THREE.MeshBasicMaterial({
              map:         tex,
              transparent: true,
              alphaTest:   0.05,
              side:        THREE.DoubleSide,
              depthWrite:  false
            });
            obj.material.needsUpdate = true;

            // ── FIX 2: Size — make pizza bigger ───────────
            // Default scale from Desktop app is often too small.
            // Set to 2x to make it a realistic pizza size.
            obj.scale.set(currentScale, currentScale, currentScale);

            meshFixed = true;
            dbg("✅ All fixes applied — pizza ready!");
            instrEl.textContent = "🔍 Move phone over table to detect surface";
          });
        },

        // onUpdate fires after pose is updated each frame
        // Use it to update the instruction text
        onUpdate: () => {
          if (meshFixed && instrEl.textContent.includes("Move phone")) {
            instrEl.textContent = "✅ Surface found — tap 📍 Move then tap table";
          }
        }
      });

      dbg("Module registered — waiting for scene...");
    });

  </script>

  <!--
    bundle.js comes AFTER our module registration above.
    It calls XR8.run() which starts the pipeline and
    triggers our onProcessCpu callbacks each frame.
  -->
  <script src="bundle.js"></script>

  <!--
    UI interaction logic — also after bundle.js
    but pizzaMesh is set by the pipeline module above
    so these functions will always have access to it.
  -->
  <script>

    // ── Move button ───────────────────────────────────────
    function startMove() {
      if (!pizzaMesh) {
        dbg("Still loading — wait for '✅ All fixes applied'");
        instrEl.textContent = "⚠️ Still loading — try again in a moment";
        return;
      }
      waitingToMove = true;
      instrEl.textContent = "👆 Tap anywhere on the table to move the pizza";
      dbg("Waiting for tap to reposition...");
    }

    // ── Tap to move ───────────────────────────────────────
    document.addEventListener("touchend", (e) => {
      if (e.changedTouches.length !== 1) return;
      if (e.target.closest(".btn")) return;
      if (!waitingToMove || !pizzaMesh) return;

      e.preventDefault();

      const t = e.changedTouches[0];
      const x = t.clientX / window.innerWidth;
      const y = t.clientY / window.innerHeight;

      dbg("Running hit test at " + x.toFixed(2) + ", " + y.toFixed(2) + "...");

      try {
        const hits = XR8.XrController.hitTest(x, y, {
          includedTypes: [
            "FEATURE_POINT",
            "ESTIMATED_SURFACE",
            "DETECTED_SURFACE"
          ]
        });

        if (hits && hits.length > 0) {
          const h = hits[0];
          pizzaMesh.position.set(h.position.x, h.position.y, h.position.z);
          waitingToMove = false;
          instrEl.textContent = "✅ Pizza moved!  Tap 📍 Move anytime to reposition";
          dbg("✅ Moved to " + h.position.x.toFixed(2) + ", " + h.position.z.toFixed(2));
        } else {
          instrEl.textContent = "⚠️ No surface found — point camera at table and tap";
          dbg("⚠️ Hit test returned 0 results");
        }

      } catch (err) {
        instrEl.textContent = "⚠️ Still scanning — move phone slowly over table";
        dbg("Hit test error: " + err.message);
      }

    }, { passive: false });

    // ── Switch pizza ──────────────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      labelEl.textContent = p.name;
      ingEl.textContent   = p.ingredients;

      if (!pizzaMesh) {
        dbg("Labels updated — mesh loading, texture will update shortly");
        return;
      }

      dbg("Loading: " + p.asset);

      new THREE.TextureLoader().load(
        p.asset,
        (tex) => {
          tex.flipY = false;
          pizzaMesh.material.map = tex;
          pizzaMesh.material.needsUpdate = true;
          dbg("✅ Switched to: " + p.name);
        },
        undefined,
        () => dbg("❌ Could not load: " + p.asset)
      );
    }

    // ── Pinch to resize ───────────────────────────────────
    document.addEventListener("touchmove", (e) => {
      if (e.touches.length !== 2 || !pizzaMesh) return;
      e.preventDefault();

      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDist !== null) {
        const ratio  = dist / lastPinchDist;
        currentScale = Math.min(Math.max(currentScale * ratio, 0.3), 6.0);
        pizzaMesh.scale.set(currentScale, currentScale, currentScale);
        dbg("Size: " + currentScale.toFixed(1) + "x");
      }
      lastPinchDist = dist;

    }, { passive: false });

    document.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) lastPinchDist = null;
    }, { passive: true });

  </script>
</body>
</html>
