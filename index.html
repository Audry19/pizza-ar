<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pizza AR Menu</title>

  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous"
          src="./external/xr/xr.js"
          async="true"
          data-preload-chunks="slam">
  </script>

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      /* Prevents double-tap zoom on every element */
      touch-action: manipulation;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* Force the 8th Wall canvas to always fill full screen */
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* UI sits above the canvas */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
    }

    #pizza-label {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }

    #ingredients {
      position: absolute;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #ffd166;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
    }

    #debug {
      position: absolute;
      top: 128px;
      left: 10px; right: 10px;
      background: rgba(0,0,0,0.82);
      color: #00ff88;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 11px;
      text-align: center;
    }

    #instructions {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      text-align: center;
      width: 85%;
      line-height: 1.5;
    }

    #btn-row {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      pointer-events: all;
    }

    .btn {
      color: white;
      border: none;
      padding: 15px 28px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      /* Prevent double-tap zoom on buttons */
      touch-action: manipulation;
    }
    #move-btn   { background: #2b9348; }
    #switch-btn { background: #e63946; }
  </style>
</head>
<body>

  <div id="ui">
    <div id="pizza-label">Pepperoni Pizza</div>
    <div id="ingredients">Tomato sauce · Pepperoni · Mozzarella · Oregano</div>
    <div id="debug">⏳ Loading scene...</div>
    <div id="instructions">🔍 Move phone slowly over the table</div>
    <div id="btn-row">
      <button class="btn" id="move-btn"   onclick="startMove()">📍 Move</button>
      <button class="btn" id="switch-btn" onclick="switchPizza()">🍕 Switch</button>
    </div>
  </div>

  <script src="bundle.js"></script>

  <script>

    // ── Prevent ALL double-tap zoom ───────────────────────
    let lastTap = 0;
    document.addEventListener("touchend", function(e) {
      const now = Date.now();
      if (now - lastTap < 350) {
        e.preventDefault(); // block the zoom
      }
      lastTap = now;
    }, { passive: false });

    // ── Pizza data ────────────────────────────────────────
    const pizzas = [
      {
        name:        "Pepperoni Pizza",
        asset:       "assets/1.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano"
      },
      {
        name:        "BBQ Chicken Pizza",
        asset:       "assets/2.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers"
      },
      {
        name:        "Margherita Pizza",
        asset:       "assets/3.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex  = 0;
    let pizzaMesh     = null;
    let waitingToMove = false;
    let currentScale  = 1.0;
    let lastPinchDist = null;

    const labelEl = document.getElementById("pizza-label");
    const ingEl   = document.getElementById("ingredients");
    const instrEl = document.getElementById("instructions");
    const debugEl = document.getElementById("debug");

    function dbg(msg) {
      console.log(msg);
      debugEl.textContent = msg;
    }

    // ── Find pizza mesh — defensive approach ──────────────
    // XR8.Threejs.xrScene() can return different shapes
    // depending on the version. We handle all cases.
    function getThreeScene() {
      try {
        const result = XR8.Threejs.xrScene();

        // Handle different return shapes
        if (!result)            return null;
        if (result.scene)       return result.scene;  // { scene, camera, renderer }
        if (result.isScene)     return result;         // Scene object directly
        if (result.type === "Scene") return result;

        // Last resort — check all properties for a Scene
        for (const key of Object.keys(result)) {
          if (result[key] && result[key].type === "Scene") {
            return result[key];
          }
        }

        dbg("xrScene shape unknown: " + Object.keys(result).join(", "));
        return null;

      } catch (err) {
        dbg("xrScene error: " + err.message);
        return null;
      }
    }

    // Poll until we find the mesh
    function findMesh() {
      const scene = getThreeScene();

      if (!scene) {
        dbg("⏳ Scene not available yet, retrying...");
        setTimeout(findMesh, 600);
        return;
      }

      const meshes = [];
      scene.traverse(obj => {
        if (obj.isMesh) meshes.push(obj);
      });

      dbg("Meshes in scene: " + meshes.length);

      if (meshes.length === 0) {
        setTimeout(findMesh, 600);
        return;
      }

      // Find the pizza plane — it will have a texture map
      let target = meshes.find(m => m.material && m.material.map);
      if (!target) {
        // No texture yet — wait a bit more
        dbg("Mesh found but no texture yet, waiting...");
        setTimeout(findMesh, 600);
        return;
      }

      pizzaMesh = target;
      dbg("✅ Pizza mesh ready. Fixing lighting...");
      fixLighting();
    }

    // ── Fix lighting — apply MeshBasicMaterial ────────────
    // MeshBasicMaterial is completely unaffected by any scene lights.
    // The pizza will always show its true colors.
    function fixLighting() {
      if (!pizzaMesh) return;

      const existingTexture = pizzaMesh.material.map;

      pizzaMesh.material = new THREE.MeshBasicMaterial({
        map:         existingTexture,
        transparent: true,
        alphaTest:   0.05,
        side:        THREE.DoubleSide,
        depthWrite:  false
      });

      pizzaMesh.material.needsUpdate = true;
      dbg("✅ Lighting fixed. Tap table to place pizza.");
      instrEl.textContent = "🔍 Move phone slowly over the table";
    }

    // Start after XR8 is fully loaded
    window.addEventListener("xrloaded", () => {
      dbg("✅ XR8 loaded — finding mesh...");
      setTimeout(findMesh, 1000);
    });

    // Update instruction when surface is detected
    window.addEventListener("xrupdated", () => {
      if (pizzaMesh && instrEl.textContent.includes("Move phone")) {
        instrEl.textContent = "✅ Surface found — tap table to place pizza";
      }
    });

    // ── Move: tap to reposition ───────────────────────────
    document.addEventListener("touchend", function(e) {
      // Only handle single-finger taps
      if (e.changedTouches.length !== 1) return;
      // Ignore button taps
      if (e.target.closest(".btn")) return;
      // Only run when Move button was pressed
      if (!waitingToMove) return;
      if (!pizzaMesh)     return;

      e.preventDefault();

      const touch = e.changedTouches[0];
      const x = touch.clientX / window.innerWidth;
      const y = touch.clientY / window.innerHeight;

      dbg("Hit testing at " + x.toFixed(2) + ", " + y.toFixed(2) + "...");

      try {
        const hits = XR8.XrController.hitTest(x, y, {
          includedTypes: [
            "FEATURE_POINT",
            "ESTIMATED_SURFACE",
            "DETECTED_SURFACE"
          ]
        });

        if (hits && hits.length > 0) {
          const h = hits[0];
          pizzaMesh.position.set(h.position.x, h.position.y, h.position.z);
          waitingToMove = false;
          instrEl.textContent = "✅ Moved!  📍 Move to reposition again";
          dbg("✅ Pizza moved to surface");
        } else {
          instrEl.textContent = "⚠️ No surface there — point at table and tap again";
          dbg("⚠️ Hit test: 0 results");
        }

      } catch(err) {
        instrEl.textContent = "⚠️ Still scanning — move phone slowly over table";
        dbg("Hit test error: " + err.message);
      }

    }, { passive: false });

    // ── Move button ───────────────────────────────────────
    function startMove() {
      if (!pizzaMesh) {
        dbg("⚠️ Scene still loading — wait a moment");
        instrEl.textContent = "⚠️ Still loading — try again in a moment";
        return;
      }
      waitingToMove = true;
      instrEl.textContent = "👆 Tap the table where you want the pizza";
      dbg("Tap the table to move pizza...");
    }

    // ── Switch pizza ──────────────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      labelEl.textContent = p.name;
      ingEl.textContent   = p.ingredients;
      dbg("Switching to: " + p.name);

      if (!pizzaMesh) {
        dbg("⚠️ Mesh not ready for texture swap");
        return;
      }

      const loader = new THREE.TextureLoader();
      loader.load(
        p.asset,
        (tex) => {
          tex.flipY = false;
          pizzaMesh.material.map = tex;
          pizzaMesh.material.needsUpdate = true;
          dbg("✅ Switched to: " + p.name);
        },
        undefined,
        () => dbg("❌ Could not load: " + p.asset)
      );
    }

    // ── Pinch to resize ───────────────────────────────────
    document.addEventListener("touchmove", function(e) {
      if (e.touches.length !== 2 || !pizzaMesh) return;

      // Stop page from scrolling or zooming during pinch
      e.preventDefault();

      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDist !== null) {
        const ratio  = dist / lastPinchDist;
        currentScale = Math.min(Math.max(currentScale * ratio, 0.1), 5.0);
        pizzaMesh.scale.set(currentScale, currentScale, currentScale);
        dbg("Scale: " + currentScale.toFixed(2) + "x");
      }
      lastPinchDist = dist;

    }, { passive: false });

    document.addEventListener("touchend", function(e) {
      if (e.touches.length < 2) lastPinchDist = null;
    }, { passive: true });

  </script>
</body>
</html>
