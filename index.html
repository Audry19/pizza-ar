<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pizza AR</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    button {
      position: fixed;
      bottom: 20px;
      padding: 12px 18px;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }

    #nextBtn { left: 20px; }
    #moveBtn { right: 20px; }

    #ingredients {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<button id="nextBtn">🍕 Change Pizza</button>
<button id="moveBtn">📦 Move Pizza</button>

<div id="ingredients">Tap to place pizza</div>

<script type="module" src="./xr.js"></script>

</body>
</html>
