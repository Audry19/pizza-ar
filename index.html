<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Pizza AR Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    /* ── CAMERA fills screen ── */
    #camera {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none;
    }

    /* ── START SCREEN ── */
    #start-screen {
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 36px;
      text-align: center;
      color: white;
    }
    #start-screen .emoji { font-size: 72px; line-height: 1; }
    #start-screen h1 { font-size: 26px; font-weight: bold; }
    #start-screen p {
      font-size: 14px;
      opacity: 0.7;
      line-height: 1.8;
      max-width: 300px;
    }
    #start-btn {
      background: #e63946;
      color: white;
      border: none;
      padding: 18px 52px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }

    /* ── PIZZA NAME ── */
    #pizza-label {
      position: fixed;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 19px;
      font-weight: bold;
      z-index: 50;
      white-space: nowrap;
      display: none;
    }

    /* ── INGREDIENTS ── */
    #ingredients {
      position: fixed;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.58);
      color: #ffd166;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 50;
      white-space: nowrap;
      display: none;
    }

    /* ── INSTRUCTION ── */
    #instructions {
      position: fixed;
      bottom: 128px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.68);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 50;
      pointer-events: none;
      text-align: center;
      width: 84%;
      line-height: 1.5;
      display: none;
    }

    /* ── SWITCH BUTTON ── */
    #switch-btn {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      background: #e63946;
      color: white;
      border: none;
      padding: 16px 46px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      z-index: 50;
      display: none;
    }

    /* ── SURFACE HINT ring ── */
    #surface-ring {
      position: fixed;
      width: 120px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.85);
      border-radius: 50%;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      z-index: 30;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 16px rgba(255,255,255,0.3);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 0.5; transform: translate(-50%,-50%) scale(1.08); }
    }

    /* ── PIZZA WRAPPER ── */
    /*
      The trick to making pizza look flat on a table:
      - CSS perspective on the parent creates the 3D space
      - rotateX on the image tilts it to lie flat
      - The gyroscope shifts the wrapper position so it
        stays locked to the surface as the phone moves
    */
    #pizza-wrap {
      position: fixed;
      z-index: 20;
      display: none;
      /* perspective creates the 3D depth effect */
      perspective: 800px;
      perspective-origin: 50% 0%;
      transform: translate(-50%, -50%);
      /* smooth movement when gyroscope adjusts position */
      transition: left 0.08s linear, top 0.08s linear;
    }

    #pizza-img {
      /*
        width > height on purpose:
        rotateX compresses vertical dimension, making a circle look oval.
        Making height = width * 1.4 compensates for the compression
        so the pizza looks round, not squeezed.
      */
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      transform: rotateX(52deg);
      transform-origin: center center;
      filter: drop-shadow(0 16px 28px rgba(0,0,0,0.65));
      transition: opacity 0.3s ease;
    }

  </style>
</head>
<body>

  <!-- ── START SCREEN ── -->
  <div id="start-screen">
    <div class="emoji">🍕</div>
    <h1>Pizza AR Menu</h1>
    <p>
      Point your camera at the table<br>
      and tap to place the pizza.<br><br>
      The pizza will <b>stay on the table</b><br>
      as you move your phone around.
    </p>
    <button id="start-btn" onclick="startApp()">Open Camera</button>
  </div>

  <!-- ── CAMERA ── -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- ── SURFACE RING (pulsing circle on table) ── -->
  <div id="surface-ring"></div>

  <!-- ── UI ── -->
  <div id="pizza-label">BBQ Chicken Pizza</div>
  <div id="ingredients">BBQ sauce · Chicken · Olives · Bell peppers · Mozzarella</div>
  <div id="instructions">👆 Tap the table to place pizza here</div>
  <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>

  <!-- ── PIZZA ── -->
  <div id="pizza-wrap">
    <img id="pizza-img" src="images/bbq-chicken.png" alt="pizza" />
  </div>

  <script>

    // ─────────────────────────────────────────────────────
    // PIZZA DATA
    // ─────────────────────────────────────────────────────
    const pizzas = [
      {
        name:        "BBQ Chicken Pizza",
        image:       "images/bbq-chicken.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers · Mozzarella"
      },
      {
        name:        "Pepperoni Pizza",
        image:       "images/pepperoni.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano · Basil"
      },
      {
        name:        "Margherita Pizza",
        image:       "images/margherita.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex = 0;
    let pizzaPlaced  = false;

    // DOM
    const pizzaWrap  = document.getElementById("pizza-wrap");
    const pizzaImg   = document.getElementById("pizza-img");
    const labelEl    = document.getElementById("pizza-label");
    const ingEl      = document.getElementById("ingredients");
    const instrEl    = document.getElementById("instructions");
    const ringEl     = document.getElementById("surface-ring");

    // ─────────────────────────────────────────────────────
    // SURFACE ANCHORING SYSTEM
    //
    // How this works:
    // When the customer taps, we record:
    //   1. Where on screen they tapped (tapX, tapY)
    //   2. The phone's tilt angle at that moment (anchorBeta, anchorGamma)
    //
    // As the phone moves, we measure how much the tilt has changed.
    // We shift the pizza position to compensate for that movement.
    // This makes the pizza appear to stay glued to the table surface.
    //
    // Example: phone tilts 10° to the right after placing the pizza.
    //   → We move the pizza 10° worth of pixels to the right too
    //   → From the user's perspective, pizza hasn't moved from the table
    // ─────────────────────────────────────────────────────

    // Current device angles (updated 60x/second by gyroscope)
    let currentBeta  = 90;   // forward/back tilt
    let currentGamma = 0;    // left/right tilt
    let currentAlpha = 0;    // compass rotation

    // Angles recorded at moment of tap
    let anchorBeta   = 90;
    let anchorGamma  = 0;
    let anchorAlpha  = 0;

    // Screen position where pizza was placed
    let anchorX      = window.innerWidth  / 2;
    let anchorY      = window.innerHeight / 2;

    // How sensitive the compensation is
    // Higher = pizza moves more with phone tilt
    const SENSITIVITY_X = 8;   // pixels per degree (left/right)
    const SENSITIVITY_Y = 5;   // pixels per degree (forward/back)

    // ─────────────────────────────────────────────────────
    // START CAMERA
    // ─────────────────────────────────────────────────────
    async function startApp() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width:      { ideal: 1280 },
            height:     { ideal: 720  }
          },
          audio: false
        });

        const cam = document.getElementById("camera");
        cam.srcObject = stream;
        cam.style.display = "block";
        await cam.play();

        // Hide start screen
        document.getElementById("start-screen").style.display = "none";

        // Show UI
        labelEl.style.display   = "block";
        ingEl.style.display     = "block";
        instrEl.style.display   = "block";
        ringEl.style.display    = "block";  // pulsing ring on table
        document.getElementById("switch-btn").style.display = "block";

        // Request iOS sensor permission (must be after user gesture)
        requestOrientationPermission();

      } catch (err) {
        document.getElementById("start-screen").innerHTML =
          "<div style='color:white; padding:32px; text-align:center; line-height:2.2'>" +
          "<div style='font-size:48px'>🔒</div>" +
          "<b style='font-size:18px'>Camera Blocked</b><br><br>" +
          "On iPhone: go to<br>" +
          "<b>Settings → Safari → Camera</b><br>" +
          "and set it to <b>Allow</b><br><br>" +
          "Then reload this page." +
          "</div>";
      }
    }

    // ─────────────────────────────────────────────────────
    // DEVICE ORIENTATION — reads phone tilt 60x per second
    // ─────────────────────────────────────────────────────
    function requestOrientationPermission() {
      if (typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function") {
        // iOS 13+ — needs explicit permission
        DeviceOrientationEvent.requestPermission()
          .then(state => {
            if (state === "granted") startOrientationListener();
          })
          .catch(() => startOrientationListener());
      } else {
        // Android — no permission needed
        startOrientationListener();
      }
    }

    function startOrientationListener() {
      window.addEventListener("deviceorientation", function(e) {
        if (e.beta  !== null) currentBeta  = e.beta;
        if (e.gamma !== null) currentGamma = e.gamma;
        if (e.alpha !== null) currentAlpha = e.alpha;

        // Only update pizza position AFTER it has been placed
        if (pizzaPlaced) updatePizzaPosition();

        // Auto-adjust the tilt angle of the pizza image
        // based on how the phone is held
        adjustPizzaTilt(e.beta);

      }, true);
    }

    // ─────────────────────────────────────────────────────
    // AUTO-ADJUST PIZZA TILT
    //
    // Makes the pizza look more realistic based on phone angle:
    //   Phone upright (beta ~90°)  → pizza looks more perspective-y
    //   Phone angled down (beta ~130°) → pizza looks flatter
    // ─────────────────────────────────────────────────────
    function adjustPizzaTilt(beta) {
      if (!beta) return;
      // Clamp beta to useful range
      const b       = Math.min(Math.max(beta, 75), 155);
      // Map to rotateX range: 38° (more upright) to 65° (very flat)
      const rotateX = 38 + ((b - 75) / 80) * 27;
      pizzaImg.style.transform = "rotateX(" + rotateX.toFixed(1) + "deg)";
    }

    // ─────────────────────────────────────────────────────
    // UPDATE PIZZA POSITION — called every gyroscope tick
    //
    // Moves the pizza wrapper to compensate for phone movement
    // so the pizza appears anchored to the table surface
    // ─────────────────────────────────────────────────────
    function updatePizzaPosition() {
      // How much has the phone rotated since we placed the pizza?
      const deltaBeta  = currentBeta  - anchorBeta;
      const deltaGamma = currentGamma - anchorGamma;

      // Convert rotation to pixel offset
      // Negative delta = phone tilted toward floor = pizza moves up on screen
      const offsetX = deltaGamma * SENSITIVITY_X;
      const offsetY = deltaBeta  * SENSITIVITY_Y;

      // New screen position = original tap position + compensation offset
      const newX = anchorX + offsetX;
      const newY = anchorY - offsetY;  // minus because screen Y is inverted

      // Clamp so pizza never goes fully off screen
      const clampedX = Math.min(Math.max(newX, 60),  window.innerWidth  - 60);
      const clampedY = Math.min(Math.max(newY, 100), window.innerHeight - 140);

      pizzaWrap.style.left = clampedX + "px";
      pizzaWrap.style.top  = clampedY + "px";
    }

    // ─────────────────────────────────────────────────────
    // TAP TO PLACE PIZZA
    // ─────────────────────────────────────────────────────
    function handleTap(clientX, clientY) {
      // Record where they tapped
      anchorX = clientX;
      anchorY = clientY;

      // Record phone angle at this exact moment
      anchorBeta  = currentBeta;
      anchorGamma = currentGamma;
      anchorAlpha = currentAlpha;

      // Place pizza at tap position
      pizzaWrap.style.left    = anchorX + "px";
      pizzaWrap.style.top     = anchorY + "px";
      pizzaWrap.style.display = "block";

      // Hide the pulsing ring — pizza is placed
      ringEl.style.display = "none";

      if (!pizzaPlaced) {
        pizzaPlaced = true;
        instrEl.textContent = "Move phone around — pizza stays on table  ·  Pinch to resize";
      }
    }

    // Touch (phone)
    document.addEventListener("touchstart", function(e) {
      if (e.target.closest("button")) return;
      if (document.getElementById("start-screen").style.display !== "none") return;
      const t = e.touches[0];
      handleTap(t.clientX, t.clientY);
    }, { passive: true });

    // Click (desktop testing in browser)
    document.addEventListener("click", function(e) {
      if (e.target.closest("button")) return;
      if (document.getElementById("start-screen").style.display !== "none") return;
      handleTap(e.clientX, e.clientY);
    });

    // ─────────────────────────────────────────────────────
    // SWITCH PIZZA
    // ─────────────────────────────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      // Fade out → swap image → fade in
      pizzaImg.style.opacity = "0";
      setTimeout(() => {
        pizzaImg.src        = p.image;
        labelEl.textContent = p.name;
        ingEl.textContent   = p.ingredients;
        pizzaImg.style.opacity = "1";
      }, 300);
    }

    // ─────────────────────────────────────────────────────
    // PINCH TO RESIZE
    // ─────────────────────────────────────────────────────
    let lastPinchDist = null;
    let currentSize   = 260;

    document.addEventListener("touchmove", function(e) {
      if (e.touches.length === 2) {
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (lastPinchDist !== null) {
          const ratio = dist / lastPinchDist;
          currentSize = Math.min(Math.max(currentSize * ratio, 80), 520);
          pizzaImg.style.width  = currentSize + "px";
          pizzaImg.style.height = currentSize + "px";
        }
        lastPinchDist = dist;
      }
    }, { passive: true });

    document.addEventListener("touchend", function(e) {
      if (e.touches.length < 2) lastPinchDist = null;
    }, { passive: true });

  </script>
</body>
</html>
