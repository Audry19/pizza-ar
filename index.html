<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza AR Menu</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      #pizza-label {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 28px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        z-index: 999;
        white-space: nowrap;
      }

      #instructions {
        position: fixed;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.65);
        color: white;
        padding: 10px 22px;
        border-radius: 30px;
        font-size: 14px;
        z-index: 999;
        pointer-events: none;
        text-align: center;
        white-space: nowrap;
      }

      #switch-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #e63946;
        color: white;
        border: none;
        padding: 16px 40px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        z-index: 999;
      }

      #debug {
        position: fixed;
        top: 80px;
        left: 12px;
        background: rgba(0,0,0,0.65);
        color: #00ff88;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 11px;
        z-index: 999;
        pointer-events: none;
        max-width: 220px;
        line-height: 1.7;
      }
    </style>
  </head>

  <body>
    <div id="pizza-label">BBQ Chicken Pizza</div>
    <div id="instructions">👆 Tap the table to place pizza</div>
    <div id="debug">Loading...</div>
    <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>

    <a-scene
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >
      <a-assets timeout="15000">
        <img id="img-bbq"        src="images/bbq-chicken.png"  crossorigin="anonymous" />
        <img id="img-pepperoni"  src="images/pepperoni.png"    crossorigin="anonymous" />
        <img id="img-margherita" src="images/margherita.png"   crossorigin="anonymous" />
      </a-assets>

      <!--
        a-plane lies flat when rotation is -90 0 0
        Start invisible — shown after tap
        position 0 0 0 is just a default, JS will move it
      -->
      <a-plane
        id="pizza-plane"
        src="#img-bbq"
        width="0.3"
        height="0.3"
        rotation="-90 0 0"
        position="0 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.15; side: double; shader: flat;"
      ></a-plane>

      <a-camera id="main-camera" look-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
      const pizzas = [
        { name: "BBQ Chicken Pizza",  imgId: "#img-bbq"        },
        { name: "Pepperoni Pizza",    imgId: "#img-pepperoni"  },
        { name: "Margherita Pizza",   imgId: "#img-margherita" }
      ];

      let currentIndex = 0;
      let placed = false;

      const plane  = document.getElementById("pizza-plane");
      const label  = document.getElementById("pizza-label");
      const instr  = document.getElementById("instructions");
      const debug  = document.getElementById("debug");
      const scene  = document.querySelector("a-scene");

      // ── Check images loaded ──────────────────────────────
      document.querySelectorAll("a-assets img").forEach(img => {
        img.addEventListener("load",  () => debug.textContent += "\n✅ " + img.src.split("/").pop());
        img.addEventListener("error", () => debug.textContent += "\n❌ MISSING: " + img.src.split("/").pop());
      });

      scene.addEventListener("loaded", () => {
        debug.textContent = "✅ Scene ready\nTap table to place pizza";
      });

      // ── Place pizza in front of camera ──────────────────
      function placePizzaInFrontOfCamera() {
        const cam = document.getElementById("main-camera");

        // Get the camera's real world position and rotation from Three.js
        const camObj   = cam.object3D;
        const position = new THREE.Vector3();
        const direction = new THREE.Vector3();

        camObj.getWorldPosition(position);
        camObj.getWorldDirection(direction);

        // Place the pizza 0.6 metres in front of the camera
        // and pull it DOWN so it sits on the table surface
        const distance = 0.6;
        const pizzaX = position.x + direction.x * distance;
        const pizzaY = position.y - 0.25;   // lower than eye level = table height
        const pizzaZ = position.z + direction.z * distance;

        plane.setAttribute("position", { x: pizzaX, y: pizzaY, z: pizzaZ });
        plane.setAttribute("visible", "true");

        debug.textContent = "✅ Pizza placed!\nTap again to move it\nPinch to resize";
      }

      // ── Tap handler ──────────────────────────────────────
      function handleTap(e) {
        // Ignore button taps
        if (e.target.closest("#switch-btn")) return;

        placePizzaInFrontOfCamera();

        if (!placed) {
          placed = true;
          instr.textContent = "Tap to move  ·  Pinch to resize";
        }
      }

      // Both touch (phone) and click (desktop)
      document.addEventListener("touchend", handleTap, { passive: true });
      document.addEventListener("click",    handleTap);

      // ── Switch pizza ─────────────────────────────────────
      function switchPizza() {
        currentIndex = (currentIndex + 1) % pizzas.length;
        const p = pizzas[currentIndex];
        plane.setAttribute("src", p.imgId);
        label.textContent = p.name;
        debug.textContent = "🍕 Switched to:\n" + p.name;
      }

      // ── Pinch to resize ──────────────────────────────────
      let lastPinchDist = null;

      document.addEventListener("touchmove", function(e) {
        if (e.touches.length === 2) {
          const dx   = e.touches[0].clientX - e.touches[1].clientX;
          const dy   = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (lastPinchDist !== null) {
            const ratio = dist / lastPinchDist;
            const cur   = plane.getAttribute("scale") || { x: 1, y: 1, z: 1 };
            const newS  = Math.min(Math.max(cur.x * ratio, 0.05), 5);
            plane.setAttribute("scale", { x: newS, y: newS, z: newS });
          }
          lastPinchDist = dist;
        }
      }, { passive: true });

      document.addEventListener("touchend", function(e) {
        if (e.touches.length < 2) lastPinchDist = null;
      }, { passive: true });
    </script>
  </body>
</html>
