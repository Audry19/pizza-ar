<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pizza AR Menu</title>

  <script src="./external/runtime/runtime.js"></script>
  <script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial; }
    canvas { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; }

    #ui { position: fixed; inset: 0; z-index: 999; pointer-events: none; }

    #pizza-label {
      position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white;
      padding: 10px 24px; border-radius: 40px;
      font-weight: bold;
    }

    #ingredients {
      position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: #ffd166;
      padding: 6px 16px; border-radius: 20px;
      font-size: 12px;
    }

    #instructions {
      position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: white;
      padding: 12px 20px; border-radius: 30px;
    }

    #btn-row {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; pointer-events: all;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    #move-btn { background: #2b9348; }
    #switch-btn { background: #e63946; }
  </style>
</head>

<body>

<div id="ui">
  <div id="pizza-label">Pepperoni Pizza</div>
  <div id="ingredients">Tomato sauce · Pepperoni · Mozzarella</div>
  <div id="instructions">Move phone to detect surface</div>

  <div id="btn-row">
    <button class="btn" id="move-btn" onclick="startMove()">📍 Move</button>
    <button class="btn" id="switch-btn" onclick="switchPizza()">🍕 Switch</button>
  </div>
</div>

<script>

const pizzas = [
  { name: "Pepperoni Pizza", asset: "assets/1.png", ingredients: "Tomato sauce · Pepperoni · Mozzarella" },
  { name: "BBQ Chicken Pizza", asset: "assets/2.png", ingredients: "BBQ sauce · Chicken · Olives" },
  { name: "Margherita Pizza", asset: "assets/3.png", ingredients: "Tomato sauce · Mozzarella · Basil" }
];

let currentIndex = 0;
let pizzaMesh = null;
let pizzaRoot = null;
let sceneRef = null;

let waitingToMove = false;
let currentScale = 2;
let lastPinchDist = null;

const labelEl = document.getElementById("pizza-label");
const ingEl = document.getElementById("ingredients");
const instrEl = document.getElementById("instructions");

// ───────── Get Scene ─────────
function getScene() {
  try {
    const xr = XR8.Threejs.xrScene();
    return xr.scene || xr;
  } catch {
    return null;
  }
}

// ───────── Find Mesh ─────────
function findMesh(scene) {
  let found = null;
  scene.traverse(obj => {
    if (!found && obj.isMesh) found = obj;
  });
  return found;
}

// ───────── Apply Texture ─────────
function applyTexture(tex) {
  if (!pizzaMesh) return;

  tex.flipY = false;

  if (Array.isArray(pizzaMesh.material)) {
    pizzaMesh.material.forEach(mat => {
      mat.map = tex;
      mat.needsUpdate = true;
    });
  } else {
    pizzaMesh.material.map = tex;
    pizzaMesh.material.needsUpdate = true;
  }
}

// ───────── XR Module ─────────
window.addEventListener("xrloaded", () => {

  XR8.addCameraPipelineModule({
    name: "pizza-module",

    onUpdate: () => {
      if (!sceneRef) {
        sceneRef = getScene();
      }

      if (sceneRef && !pizzaMesh) {
        pizzaMesh = findMesh(sceneRef);
        if (pizzaMesh) {
          pizzaRoot = pizzaMesh.parent;

          // Fix lighting
          pizzaMesh.material = new THREE.MeshBasicMaterial({
            map: pizzaMesh.material.map,
            transparent: true,
            side: THREE.DoubleSide
          });

          instrEl.textContent = "Tap Move to reposition";
        }
      }
    }
  });

});

</script>

<script src="bundle.js"></script>

<script>

// ───────── Switch Pizza ─────────
function switchPizza() {
  currentIndex = (currentIndex + 1) % pizzas.length;
  const p = pizzas[currentIndex];

  labelEl.textContent = p.name;
  ingEl.textContent = p.ingredients;

  new THREE.TextureLoader().load(p.asset, tex => {
    applyTexture(tex);
  });
}

// ───────── Move Mode ─────────
function startMove() {
  if (!pizzaRoot) return;
  waitingToMove = true;
  instrEl.textContent = "Tap on surface";
}

// ───────── Tap Move ─────────
document.addEventListener("touchend", (e) => {

  if (!waitingToMove || !pizzaRoot) return;
  if (e.target.closest(".btn")) return;

  const t = e.changedTouches[0];
  const x = t.clientX / window.innerWidth;
  const y = t.clientY / window.innerHeight;

  const hits = XR8.XrController.hitTest(x, y, {
    includedTypes: ["ESTIMATED_SURFACE"]
  });

  if (hits.length > 0) {
    const h = hits[0];
    pizzaRoot.position.set(h.position.x, h.position.y, h.position.z);

    waitingToMove = false;
    instrEl.textContent = "Moved! Tap Move again";
  }

}, { passive: false });

// ───────── Pinch Scale ─────────
document.addEventListener("touchmove", (e) => {

  if (e.touches.length !== 2 || !pizzaRoot) return;

  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (lastPinchDist) {
    const ratio = dist / lastPinchDist;
    currentScale = Math.min(Math.max(currentScale * ratio, 0.5), 5);
    pizzaRoot.scale.set(currentScale, currentScale, currentScale);
  }

  lastPinchDist = dist;

}, { passive: false });

document.addEventListener("touchend", () => {
  lastPinchDist = null;
});

</script>

</body>
</html>
