<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pizza AR Menu</title><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script><style>* { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: Arial, sans-serif; }

    /* ── All UI sits on top of the AR camera view ── */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none; /* lets AR taps pass through */
    }

    /* Pizza name — top center */
    #pizza-label {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }

    /* Ingredients — just below the name */
    #ingredients {
      position: absolute;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #ffd166;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
    }

    /* Instruction bubble — bottom center above button */
    #instructions {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      text-align: center;
      width: 85%;
      line-height: 1.5;
    }

    /* Switch pizza button — needs pointer-events to be tappable */
    #switch-btn {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #e63946;
      color: white;
      border: none;
      padding: 16px 44px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 4px 18px rgba(230,57,70,0.4);
      white-space: nowrap;
    }

    #switch-btn:active {
      transform: translateX(-50%) scale(0.96);
    }</style></head><body><div id="ui"><div id="pizza-label">Pepperoni Pizza</div><div id="ingredients">Tomato sauce · Pepperoni · Mozzarella · Oregano · Basil</div><div id="instructions">🔍 Move phone slowly over the table</div><button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button></div><script src="bundle.js"></script><script>// ── Pizza data ─────────────────────────────────────────
    // Images are named 1.png, 2.png, 3.png in your assets folder
    // Match these to your actual pizza images
    const pizzas = [
      {
        name:        "Pepperoni Pizza",
        asset:       "assets/1.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano · Basil"
      },
      {
        name:        "BBQ Chicken Pizza",
        asset:       "assets/2.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers · Mozzarella"
      },
      {
        name:        "Margherita Pizza",
        asset:       "assets/3.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex = 0;

    const labelEl = document.getElementById("pizza-label");
    const ingEl   = document.getElementById("ingredients");
    const instrEl = document.getElementById("instructions");

    // ── Listen for 8th Wall surface detection events ────────
    // Updates the instruction text when surface is found
    window.addEventListener("xrupdated", function() {
      if (instrEl.textContent.includes("Move phone")) {
        instrEl.textContent = "✅ Surface found! Tap to place pizza";
      }
    });

    // When user taps to place, update instruction
    window.addEventListener("click", function(e) {
      if (e.target.id === "switch-btn") return;
      setTimeout(() => {
        instrEl.textContent = "Tap to move  ·  Pinch to resize";
      }, 500);
    });

    // ── Switch pizza function ───────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      // Find the pizza plane in the 8th Wall scene
      // 8th Wall uses Three.js under the hood
      // We find the mesh and swap its texture
      try {
        const renderer  = XR8.Threejs.xrScene();
        const scene     = renderer.scene;

        // Walk through scene objects to find the plane mesh
        scene.traverse(function(obj) {
          if (obj.isMesh && obj.material && obj.material.map) {
            // Load new pizza texture
            const loader  = new THREE.TextureLoader();
            loader.load(p.asset, function(texture) {
              texture.flipY       = false;
              obj.material.map    = texture;
              obj.material.needsUpdate = true;
            });
          }
        });

      } catch(err) {
        // Scene not ready yet — silently ignore
        console.log("Scene not ready:", err);
      }

      // Always update the UI labels immediately
      labelEl.textContent = p.name;
      ingEl.textContent   = p.ingredients;
    }</script></body></html>
