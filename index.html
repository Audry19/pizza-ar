<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza AR Menu</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      #pizza-label {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: white;
        padding: 10px 28px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        z-index: 999;
        white-space: nowrap;
      }

      #instructions {
        position: fixed;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 24px;
        border-radius: 30px;
        font-size: 14px;
        z-index: 999;
        pointer-events: none;
        text-align: center;
        width: 80%;
      }

      #switch-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #e63946;
        color: white;
        border: none;
        padding: 16px 40px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        z-index: 999;
      }

      #debug {
        position: fixed;
        top: 16px;
        left: 8px;
        right: 8px;
        background: rgba(0,0,0,0.85);
        color: #00ff88;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 11px;
        z-index: 999;
        pointer-events: none;
        line-height: 1.9;
        max-height: 40vh;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="pizza-label">BBQ Chicken Pizza</div>
    <div id="debug">🔄 Loading...</div>
    <div id="instructions">👇 Point phone at floor then tap</div>
    <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>

    <a-scene
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >
      <a-assets timeout="20000">
        <img id="img-bbq"        src="images/bbq-chicken.png"  crossorigin="anonymous" />
        <img id="img-pepperoni"  src="images/pepperoni.png"    crossorigin="anonymous" />
        <img id="img-margherita" src="images/margherita.png"   crossorigin="anonymous" />
      </a-assets>

      <!-- Flat red disc for testing placement -->
      <a-cylinder
        id="test-disc"
        color="#FF0000"
        radius="0.3"
        height="0.02"
        visible="false"
      ></a-cylinder>

      <!-- Pizza image plane — shown after test works -->
      <a-plane
        id="pizza-plane"
        width="0.5"
        height="0.5"
        rotation="-90 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.1; side: double; shader: flat;"
      ></a-plane>

      <a-camera id="main-camera" look-controls-enabled="false"></a-camera>
    </a-scene>

    <script>

      // ── Debug helper ──────────────────────────────────────
      const debugEl = document.getElementById("debug");
      function setLog(msg) { debugEl.innerHTML = msg; }
      function log(msg)    { debugEl.innerHTML += "<br>" + msg; }

      // ── Image loading ─────────────────────────────────────
      let loadedCount = 0;
      document.querySelectorAll("a-assets img").forEach(img => {
        const name = img.src.split("/").pop();
        img.addEventListener("load",  () => { loadedCount++; log("✅ " + name); });
        img.addEventListener("error", () => log("❌ MISSING: " + name));
      });

      document.querySelector("a-scene").addEventListener("loaded", () => {
        setLog("✅ Scene ready | " + loadedCount + "/3 images loaded");
        log("👇 Point phone at floor then tap");
      });

      // ── KEY FIX: Read REAL device tilt from phone sensors ─
      // AR.js controls the camera internally and never shares
      // its rotation with Three.js getWorldDirection() — that
      // is why we kept getting Dir Y=0.00 in previous versions.
      // Solution: read the phone's physical gyroscope directly.
      //
      // deviceBeta = phone tilt forward/back (0=face up, 90=upright, 180=face down)
      // When you hold phone and tilt toward floor: beta goes above 90

      let deviceBeta  = 45;
      let deviceAlpha = 0;

      window.addEventListener("deviceorientation", function(e) {
        if (e.beta  !== null) deviceBeta  = e.beta;
        if (e.alpha !== null) deviceAlpha = e.alpha;
      }, true);

      // iOS 13+ requires explicit permission for device sensors
      function requestSensorPermission() {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          DeviceOrientationEvent.requestPermission()
            .then(state => {
              log(state === "granted" ? "✅ Sensors on" : "⚠️ Sensor denied");
            })
            .catch(() => {});
        }
      }

      // ── Floor hit geometry ────────────────────────────────
      //
      //   📱 ← phone held at ~1.5m height, tilted at angle beta
      //    \
      //     \  ← ray at angle (beta - 90) below horizontal
      //      \
      //       X ← floor hit point
      //
      // Distance in front = CAM_HEIGHT / tan(degrees_below_horizontal)
      // degrees_below_horizontal = beta - 90  (when beta > 90)

      const CAM_HEIGHT = 1.5; // metres — average eye height

      function getFloorHitDistance() {
        // When phone points toward floor, beta > 90
        // tiltBelow = how many degrees below horizontal the phone is pointing
        const tiltBelow = deviceBeta - 90;

        log("📐 Beta=" + deviceBeta.toFixed(1) +
            "° | Below horiz=" + tiltBelow.toFixed(1) + "°");

        if (tiltBelow < 5) {
          log("⚠️ Not pointing down enough (need beta > 95°)");
          log("👇 Tilt phone MORE toward the floor");
          return 1.2; // fallback distance
        }

        const tiltRad = tiltBelow * Math.PI / 180;
        const dist    = CAM_HEIGHT / Math.tan(tiltRad);

        // Clamp to sensible range: 0.3m (very close) to 4m (far)
        return Math.min(Math.max(dist, 0.3), 4.0);
      }

      // ── Forward direction from compass heading ────────────
      function getForwardXZ() {
        const heading = deviceAlpha * Math.PI / 180;
        return {
          x: -Math.sin(heading),
          z: -Math.cos(heading)
        };
      }

      // ── Tap to place ──────────────────────────────────────
      const disc  = document.getElementById("test-disc");
      const plane = document.getElementById("pizza-plane");
      const instr = document.getElementById("instructions");
      let placed  = false;

      function handleTap(e) {
        if (e.target.closest("button")) return;

        // Must be inside user gesture for iOS sensor permission
        requestSensorPermission();

        const dist    = getFloorHitDistance();
        const forward = getForwardXZ();

        const pos = {
          x: forward.x * dist,
          y: 0.01,               // just above floor so it doesn't clip
          z: forward.z * dist
        };

        disc.setAttribute("position",  pos);
        disc.setAttribute("visible",   "true");
        plane.setAttribute("position", pos);

        log("🔴 Disc at x=" + pos.x.toFixed(2) +
            " z=" + pos.z.toFixed(2) +
            " dist=" + dist.toFixed(2) + "m");

        if (!placed) {
          placed = true;
          instr.textContent = "🔴 Can you see a red circle on the floor?";
        }
      }

      document.addEventListener("touchend", handleTap, { passive: true });
      document.addEventListener("click",    handleTap);

      // ── Switch pizza ──────────────────────────────────────
      const pizzas = [
        { name: "BBQ Chicken Pizza",  id: "#img-bbq"        },
        { name: "Pepperoni Pizza",    id: "#img-pepperoni"  },
        { name: "Margherita Pizza",   id: "#img-margherita" }
      ];
      let pizzaIndex = 0;

      function switchPizza() {
        pizzaIndex = (pizzaIndex + 1) % pizzas.length;
        plane.setAttribute("src", pizzas[pizzaIndex].id);
        document.getElementById("pizza-label").textContent = pizzas[pizzaIndex].name;
        log("🍕 → " + pizzas[pizzaIndex].name);
      }

      // ── Pinch to resize ───────────────────────────────────
      let lastPinch = null;
      document.addEventListener("touchmove", e => {
        if (e.touches.length === 2) {
          const dx   = e.touches[0].clientX - e.touches[1].clientX;
          const dy   = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (lastPinch) {
            const ratio = dist / lastPinch;
            const cur   = disc.getAttribute("scale") || {x:1,y:1,z:1};
            const s     = Math.min(Math.max(cur.x * ratio, 0.1), 8);
            disc.setAttribute("scale",  {x:s, y:s, z:s});
            plane.setAttribute("scale", {x:s, y:s, z:s});
          }
          lastPinch = dist;
        }
      }, { passive: true });
      document.addEventListener("touchend", e => {
        if (e.touches.length < 2) lastPinch = null;
      }, { passive: true });

    </script>
  </body>
</html>
