<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza AR Menu</title>

    <!-- These two lines load the AR engine — no install needed -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      /* Hide the default browser UI so the camera fills the screen */
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      /* The tap-to-place instruction shown to the customer */
      #instructions {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 16px;
        text-align: center;
        z-index: 999;
        pointer-events: none;
      }

      /* The pizza name shown at the top */
      #pizza-label {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 28px;
        border-radius: 30px;
        font-size: 20px;
        font-weight: bold;
        z-index: 999;
        letter-spacing: 1px;
      }

      /* The button to switch pizzas */
      #switch-btn {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: #e63946;
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        z-index: 999;
      }
    </style>
  </head>

  <body>
    <!-- The pizza name label at the top -->
    <div id="pizza-label">Pepperoni Pizza</div>

    <!-- Instruction for the customer -->
    <div id="instructions">Point camera at table, then tap to place</div>

    <!-- Button to switch between pizzas -->
    <button id="switch-btn" onclick="switchPizza()">Switch Pizza</button>

    <!-- This is the AR scene — everything inside here is 3D/AR -->
    <a-scene
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >
      <!-- The flat pizza image — rotation -90 makes it lay flat on the table -->
      <a-image
        id="pizza-img"
        src="images/pepperoni.jpg"
        width="0.3"
        height="0.3"
        rotation="-90 0 0"
        position="0 0 0"
        visible="false"
      ></a-image>

      <!-- The camera — this is what the phone sees -->
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // List of all your pizzas
      // Add more here later — just follow the same pattern
      const pizzas = [
        { name: "Pepperoni Pizza",  image: "images/pepperoni.jpg"   },
        { name: "Margherita Pizza", image: "images/margherita.jpg"  },
        { name: "BBQ Chicken",      image: "images/bbq-chicken.jpg" }
      ];

      let currentPizza = 0;  // Start with first pizza
      let placed = false;    // Has the customer tapped yet?

      const pizzaImg = document.getElementById("pizza-img");
      const label    = document.getElementById("pizza-label");
      const instr    = document.getElementById("instructions");

      // When customer taps the screen, place the pizza
      document.addEventListener("click", function () {
        if (!placed) {
          pizzaImg.setAttribute("visible", "true");
          instr.textContent = "Tap anywhere to move pizza";
          placed = true;
        }
      });

      // Switch to next pizza when button is tapped
      function switchPizza() {
        currentPizza = (currentPizza + 1) % pizzas.length;
        const p = pizzas[currentPizza];
        pizzaImg.setAttribute("src", p.image);
        label.textContent = p.name;
      }
    </script>
  </body>
</html>
