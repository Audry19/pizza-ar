<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Pizza AR Menu</title>

  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script crossorigin="anonymous"
          src="./external/xr/xr.js"
          async="true"
          data-preload-chunks="slam">
  </script>

  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      touch-action: manipulation;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* Force AR canvas full screen always */
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }

    #ui {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
    }

    #pizza-label {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }

    #ingredients {
      position: absolute;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #ffd166;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
    }

    #debug {
      position: absolute;
      top: 128px;
      left: 10px; right: 10px;
      background: rgba(0,0,0,0.82);
      color: #00ff88;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 11px;
      text-align: center;
    }

    #instructions {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      text-align: center;
      width: 85%;
      line-height: 1.5;
    }

    #btn-row {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      pointer-events: all;
    }

    .btn {
      color: white;
      border: none;
      padding: 15px 28px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
    }

    #move-btn   { background: #2b9348; }
    #switch-btn { background: #e63946; }
  </style>
</head>
<body>

  <div id="ui">
    <div id="pizza-label">Pepperoni Pizza</div>
    <div id="ingredients">Tomato sauce · Pepperoni · Mozzarella · Oregano</div>
    <div id="debug">⏳ Starting...</div>
    <div id="instructions">🔍 Move phone slowly over the table</div>
    <div id="btn-row">
      <button class="btn" id="move-btn"   onclick="startMove()">📍 Move</button>
      <button class="btn" id="switch-btn" onclick="switchPizza()">🍕 Switch</button>
    </div>
  </div>

  <script src="bundle.js"></script>

  <script>
    // ── Block double-tap zoom ─────────────────────────────
    let lastTap = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if (now - lastTap < 350) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // ── Pizza data ────────────────────────────────────────
    const pizzas = [
      {
        name:        "Pepperoni Pizza",
        asset:       "assets/1.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano"
      },
      {
        name:        "BBQ Chicken Pizza",
        asset:       "assets/2.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers"
      },
      {
        name:        "Margherita Pizza",
        asset:       "assets/3.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex  = 0;
    let pizzaMesh     = null;   // set inside pipeline onStart — guaranteed
    let threeScene    = null;
    let threeCamera   = null;
    let waitingToMove = false;
    let currentScale  = 1.0;
    let lastPinchDist = null;

    const labelEl = document.getElementById("pizza-label");
    const ingEl   = document.getElementById("ingredients");
    const instrEl = document.getElementById("instructions");
    const debugEl = document.getElementById("debug");

    function dbg(msg) {
      console.log(msg);
      debugEl.textContent = msg;
    }

    // ── KEY FIX: XR8 Pipeline Module ─────────────────────
    // This is the CORRECT way to access the 8th Wall scene.
    // onStart() is called by XR8 after the scene is fully
    // built — scene, camera, and all meshes are guaranteed
    // to exist when this fires. No polling needed.

    const PizzaModule = {
      name: "pizza-module",

      // onStart fires once when XR session begins
      // { scene, camera, renderer } are always available here
      onStart: ({ canvas, canvasWidth, canvasHeight }) => {
        dbg("Pipeline started — getting scene...");

        // Get the Three.js scene from XR8
        const xrScene = XR8.Threejs.xrScene();

        // xrScene can be { scene, camera, renderer } OR just scene
        if (xrScene.scene) {
          threeScene  = xrScene.scene;
          threeCamera = xrScene.camera;
        } else {
          threeScene  = xrScene;
        }

        dbg("Scene ready. Traversing for mesh...");

        // Find pizza mesh — the plane with a texture
        threeScene.traverse((obj) => {
          if (obj.isMesh && obj.material) {
            dbg("Found mesh: " + obj.name + " | mat: " + obj.material.type);
            // Take the first mesh we find — our pizza plane
            if (!pizzaMesh) {
              pizzaMesh = obj;
            }
          }
        });

        if (pizzaMesh) {
          dbg("✅ Mesh found: " + pizzaMesh.name +
              " | texture: " + (pizzaMesh.material.map ? "yes" : "no"));
          fixLighting();
        } else {
          dbg("⚠️ No mesh found in scene");
        }
      },

      // onUpdate fires every frame — we use this to update instructions
      onUpdate: () => {
        if (instrEl.textContent.includes("Move phone") && pizzaMesh) {
          instrEl.textContent = "✅ Surface detected — tap table to place pizza";
        }
      }
    };

    // ── Register the module BEFORE XR8 starts ────────────
    // XR8 fires xrloaded when its engine is ready.
    // We add our module then — it will receive onStart next.
    window.addEventListener("xrloaded", () => {
      dbg("XR8 loaded — registering pizza module...");
      XR8.addCameraPipelineModule(PizzaModule);
    });

    // ── Fix lighting — MeshBasicMaterial ─────────────────
    // Completely unaffected by scene lights.
    // Pizza shows true colors always.
    function fixLighting() {
      if (!pizzaMesh) return;

      const tex = pizzaMesh.material.map || null;

      pizzaMesh.material = new THREE.MeshBasicMaterial({
        map:         tex,
        transparent: true,
        alphaTest:   0.05,
        side:        THREE.DoubleSide,
        depthWrite:  false
      });

      pizzaMesh.material.needsUpdate = true;
      dbg("✅ Lighting fixed — pizza ready!");
      instrEl.textContent = "🔍 Move phone slowly over the table";
    }

    // ── Tap to reposition ─────────────────────────────────
    document.addEventListener("touchend", (e) => {
      if (e.changedTouches.length !== 1) return;
      if (e.target.closest(".btn")) return;
      if (!waitingToMove) return;
      if (!pizzaMesh) return;

      e.preventDefault();

      const t = e.changedTouches[0];
      const x = t.clientX / window.innerWidth;
      const y = t.clientY / window.innerHeight;

      dbg("Hit testing at " + x.toFixed(2) + ", " + y.toFixed(2));

      try {
        const hits = XR8.XrController.hitTest(x, y, {
          includedTypes: [
            "FEATURE_POINT",
            "ESTIMATED_SURFACE",
            "DETECTED_SURFACE"
          ]
        });

        if (hits && hits.length > 0) {
          const h = hits[0];
          pizzaMesh.position.set(
            h.position.x,
            h.position.y,
            h.position.z
          );
          waitingToMove = false;
          instrEl.textContent = "✅ Pizza moved!  Tap 📍 Move to reposition again";
          dbg("✅ Moved to surface hit point");
        } else {
          instrEl.textContent = "⚠️ No surface there — aim at the table and tap";
          dbg("⚠️ Hit test: 0 results — aim at table surface");
        }

      } catch (err) {
        instrEl.textContent = "⚠️ Scanning surface — move phone slowly over table";
        dbg("Hit error: " + err.message);
      }

    }, { passive: false });

    // ── Move button ───────────────────────────────────────
    function startMove() {
      if (!pizzaMesh) {
        dbg("⚠️ Mesh not ready — wait for '✅ Lighting fixed' message");
        instrEl.textContent = "⚠️ Still loading — wait for the scene to fully start";
        return;
      }
      waitingToMove = true;
      instrEl.textContent = "👆 Tap the table where you want the pizza";
      dbg("Waiting for tap to reposition...");
    }

    // ── Switch pizza ──────────────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      // Always update labels immediately
      labelEl.textContent = p.name;
      ingEl.textContent   = p.ingredients;

      if (!pizzaMesh) {
        dbg("⚠️ Mesh not ready yet for texture swap");
        return;
      }

      dbg("Loading texture: " + p.asset);

      const loader = new THREE.TextureLoader();
      loader.load(
        p.asset,
        (tex) => {
          tex.flipY = false;
          pizzaMesh.material.map = tex;
          pizzaMesh.material.needsUpdate = true;
          dbg("✅ Switched to: " + p.name);
        },
        undefined,
        (err) => dbg("❌ Texture failed: " + p.asset)
      );
    }

    // ── Pinch to resize ───────────────────────────────────
    document.addEventListener("touchmove", (e) => {
      if (e.touches.length !== 2 || !pizzaMesh) return;
      e.preventDefault();

      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (lastPinchDist !== null) {
        const ratio  = dist / lastPinchDist;
        currentScale = Math.min(Math.max(currentScale * ratio, 0.1), 5.0);
        pizzaMesh.scale.set(currentScale, currentScale, currentScale);
        dbg("Scale: " + currentScale.toFixed(2) + "x");
      }
      lastPinchDist = dist;
    }, { passive: false });

    document.addEventListener("touchend", (e) => {
      if (e.touches.length < 2) lastPinchDist = null;
    }, { passive: true });

  </script>
</body>
</html>
