<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza AR Menu</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      #ui {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 999;
      }

      #instructions {
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 24px;
        border-radius: 30px;
        font-size: 15px;
        text-align: center;
        pointer-events: none;
      }

      button {
        background: #e63946;
        color: white;
        border: none;
        padding: 14px 36px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      #debug {
        position: fixed;
        top: 16px;
        left: 12px;
        right: 12px;
        background: rgba(0,0,0,0.8);
        color: #00ff88;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 12px;
        z-index: 999;
        pointer-events: none;
        line-height: 1.8;
      }
    </style>
  </head>

  <body>
    <div id="debug">🔄 Starting...</div>

    <div id="ui">
      <div id="instructions">👆 Tap table to place pizza</div>
      <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >

      <a-assets timeout="20000">
        <img id="img-bbq"        src="images/bbq-chicken.png"  crossorigin="anonymous" />
        <img id="img-pepperoni"  src="images/pepperoni.png"    crossorigin="anonymous" />
        <img id="img-margherita" src="images/margherita.png"   crossorigin="anonymous" />
      </a-assets>

      <!--
        THIS IS THE TEST SHAPE — bright red circle, no image needed
        If you can see a red circle on the table → placement works perfectly
        We will swap this for the pizza image in Step 2
      -->
      <a-cylinder
        id="test-disc"
        color="#FF0000"
        radius="0.2"
        height="0.01"
        position="0 0 0"
        visible="false"
      ></a-cylinder>

      <!--
        The real pizza plane — hidden for now
        We show this in Step 2 once we confirm placement works
      -->
      <a-plane
        id="pizza-plane"
        width="0.4"
        height="0.4"
        rotation="-90 0 0"
        position="0 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.1; side: double; shader: flat;"
      ></a-plane>

      <a-camera id="main-camera" look-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
      const log = (msg) => {
        const d = document.getElementById("debug");
        d.innerHTML += "<br>" + msg;
      };

      // Track image loading
      let imagesLoaded = 0;
      let imagesFailed = [];

      document.querySelectorAll("a-assets img").forEach(img => {
        const name = img.src.split("/").pop();
        img.addEventListener("load",  () => {
          imagesLoaded++;
          log("✅ Loaded: " + name);
        });
        img.addEventListener("error", () => {
          imagesFailed.push(name);
          log("❌ MISSING: " + name);
        });
      });

      const scene = document.querySelector("a-scene");
      scene.addEventListener("loaded", () => {
        document.getElementById("debug").innerHTML =
          "✅ Scene ready — images loaded: " + imagesLoaded +
          (imagesFailed.length ? "<br>❌ Failed: " + imagesFailed.join(", ") : "") +
          "<br>👆 Tap table to place red test circle";
      });

      const disc  = document.getElementById("test-disc");
      const plane = document.getElementById("pizza-plane");
      const instr = document.getElementById("instructions");
      let placed  = false;

      function getPositionInFrontOfCamera() {
        const cam = document.getElementById("main-camera");
        const camObj = cam.object3D;

        const pos = new THREE.Vector3();
        const dir = new THREE.Vector3();
        camObj.getWorldPosition(pos);
        camObj.getWorldDirection(dir);

        // Place 0.8m in front, 0.4m below eye level (table surface)
        return {
          x: pos.x + dir.x * 0.8,
          y: pos.y - 0.4,
          z: pos.z + dir.z * 0.8
        };
      }

      function handleTap(e) {
        if (e.target.closest("button")) return;

        const p = getPositionInFrontOfCamera();

        // Show the red test disc
        disc.setAttribute("position", p);
        disc.setAttribute("visible", "true");

        log("🔴 Test disc placed at: " +
          p.x.toFixed(2) + ", " +
          p.y.toFixed(2) + ", " +
          p.z.toFixed(2)
        );

        if (!placed) {
          placed = true;
          instr.textContent = "🔴 Can you see a red circle?";
        }
      }

      document.addEventListener("touchend", handleTap, { passive: true });
      document.addEventListener("click",    handleTap);

      // Pinch to resize
      let lastPinch = null;
      document.addEventListener("touchmove", e => {
        if (e.touches.length === 2) {
          const dx   = e.touches[0].clientX - e.touches[1].clientX;
          const dy   = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (lastPinch) {
            const ratio = dist / lastPinch;
            const cur   = disc.getAttribute("scale") || {x:1,y:1,z:1};
            const s     = Math.min(Math.max(cur.x * ratio, 0.1), 6);
            disc.setAttribute("scale", {x:s, y:s, z:s});
            plane.setAttribute("scale", {x:s, y:s, z:s});
          }
          lastPinch = dist;
        }
      }, { passive: true });

      document.addEventListener("touchend", e => {
        if (e.touches.length < 2) lastPinch = null;
      }, { passive: true });

      // Pizza switcher (not active yet — Step 2)
      const pizzas = [
        { name: "BBQ Chicken",  id: "#img-bbq"        },
        { name: "Pepperoni",    id: "#img-pepperoni"  },
        { name: "Margherita",   id: "#img-margherita" }
      ];
      let pizzaIndex = 0;

      function switchPizza() {
        pizzaIndex = (pizzaIndex + 1) % pizzas.length;
        log("🍕 Switched to " + pizzas[pizzaIndex].name);
      }
    </script>
  </body>
</html>
