<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

<script src="./external/runtime/runtime.js"></script>
<script src="./external/xr/xr.js" async data-preload-chunks="slam"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:black; overflow:hidden; font-family:Arial; }

#ui {
  position:fixed; inset:0; z-index:10; pointer-events:none;
}

#title {
  position:absolute; top:30px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:white; padding:10px 20px; border-radius:30px;
  font-weight:bold;
}

#switchBtn {
  position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
  background:#e63946; color:white;
  border:none; padding:14px 26px; border-radius:30px;
  pointer-events:all;
}
</style>
</head>

<body>

<div id="ui">
  <div id="title">Pepperoni Pizza</div>
  <button id="switchBtn" onclick="switchPizza()">🍕 Switch</button>
</div>

<script>

const pizzas = [
  { name:"Pepperoni", asset:"assets/1.png" },
  { name:"BBQ Chicken", asset:"assets/2.png" },
  { name:"Margherita", asset:"assets/3.png" }
];

let index = 0;

let scene, pizzaMesh, pizzaGroup, shadow;
let placed = false;
let scale = 1.5;
let lastDist = null;

const titleEl = document.getElementById("title");

// ───────── GET SCENE ─────────
function getScene(){
  try { return XR8.Threejs.xrScene().scene; } catch { return null; }
}

// ───────── FIND MESH ─────────
function findMesh(scene){
  let m=null;
  scene.traverse(o=>{ if(!m && o.isMesh) m=o; });
  return m;
}

// ───────── CREATE SHADOW ─────────
function createShadow(){
  const geo = new THREE.CircleGeometry(0.5, 32);
  const mat = new THREE.MeshBasicMaterial({
    color:0x000000,
    transparent:true,
    opacity:0.25
  });
  shadow = new THREE.Mesh(geo, mat);
  shadow.rotation.x = -Math.PI/2;
  shadow.scale.set(2,2,2);
  pizzaGroup.add(shadow);
}

// ───────── LOAD TEXTURE ─────────
function loadTexture(path){
  new THREE.TextureLoader().load(path, (tex)=>{
    tex.flipY = false;
    pizzaMesh.material.map = tex;
    pizzaMesh.material.needsUpdate = true;
  });
}

// ───────── XR INIT ─────────
window.addEventListener("xrloaded", ()=>{

XR8.addCameraPipelineModule({
  name:"premium-controller",

  onUpdate:()=>{

    if(!scene) scene = getScene();
    if(!scene) return;

    if(!pizzaMesh){
      pizzaMesh = findMesh(scene);

      if(pizzaMesh){

        // 🔥 FULL CONTROL MATERIAL
        pizzaMesh.material = new THREE.MeshBasicMaterial({
          transparent:true,
          side:THREE.DoubleSide
        });

        pizzaGroup = new THREE.Group();
        scene.add(pizzaGroup);

        pizzaGroup.add(pizzaMesh);
        pizzaMesh.position.set(0,0,0);

        createShadow();

        loadTexture(pizzas[0].asset);

        titleEl.textContent = pizzas[0].name;
      }
    }
  }
});

});

// ───────── SWITCH ─────────
function switchPizza(){
  index = (index+1) % pizzas.length;
  loadTexture(pizzas[index].asset);
  titleEl.textContent = pizzas[index].name;
}

// ───────── TAP PLACE ─────────
document.addEventListener("touchstart",(e)=>{

  if(!pizzaGroup) return;
  if(e.target.closest("button")) return;

  const t = e.touches[0];
  const x = t.clientX/window.innerWidth;
  const y = t.clientY/window.innerHeight;

  const hits = XR8.XrController.hitTest(x,y,{
    includedTypes:["ESTIMATED_SURFACE"]
  });

  if(hits.length>0){

    const h = hits[0];

    pizzaGroup.position.set(h.position.x, h.position.y, h.position.z);

    if(!placed){
      pizzaGroup.scale.set(scale,scale,scale);
      placed = true;
    }
  }

});

// ───────── DRAG + PINCH ─────────
document.addEventListener("touchmove",(e)=>{

  if(!pizzaGroup || !placed) return;

  // PINCH
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(lastDist){
      const ratio=dist/lastDist;
      scale=Math.min(Math.max(scale*ratio,0.5),5);
      pizzaGroup.scale.set(scale,scale,scale);
    }

    lastDist=dist;
    return;
  }

  lastDist=null;

  // DRAG
  if(e.touches.length===1){
    const t=e.touches[0];
    const x=t.clientX/window.innerWidth;
    const y=t.clientY/window.innerHeight;

    const hits = XR8.XrController.hitTest(x,y,{
      includedTypes:["ESTIMATED_SURFACE"]
    });

    if(hits.length>0){
      const h=hits[0];
      pizzaGroup.position.set(h.position.x,h.position.y,h.position.z);
    }
  }

},{passive:false});

// RESET PINCH
document.addEventListener("touchend",()=>{
  lastDist=null;
});

// ───────── FLOATING EFFECT ─────────
function animate(){
  requestAnimationFrame(animate);

  if(pizzaGroup && placed){
    pizzaGroup.position.y += Math.sin(Date.now()*0.002)*0.0005;
  }
}
animate();

</script>

<script src="bundle.js"></script>

</body>
</html>
