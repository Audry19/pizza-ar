<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Pizza AR Menu</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    /* CAMERA — fills full screen as background */
    #camera {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* START SCREEN — shown before camera opens */
    #start-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 30px;
      text-align: center;
      color: white;
    }
    #start-screen .emoji { font-size: 64px; }
    #start-screen h1 { font-size: 26px; font-weight: bold; }
    #start-screen p  { font-size: 14px; opacity: 0.7; line-height: 1.6; }
    #start-btn {
      margin-top: 10px;
      background: #e63946;
      color: white;
      border: none;
      padding: 18px 50px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    /* PIZZA NAME — top label */
    #pizza-label {
      position: fixed;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 18px;
      font-weight: bold;
      z-index: 50;
      white-space: nowrap;
      display: none;
    }

    /* INGREDIENTS — below name */
    #ingredients {
      position: fixed;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #ffd166;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 50;
      white-space: nowrap;
      display: none;
    }

    /* INSTRUCTION bubble */
    #instructions {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      z-index: 50;
      pointer-events: none;
      text-align: center;
      width: 85%;
      line-height: 1.5;
      display: none;
    }

    /* SWITCH BUTTON */
    #switch-btn {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      background: #e63946;
      color: white;
      border: none;
      padding: 16px 44px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      z-index: 50;
      display: none;
    }

    /* PIZZA IMAGE WRAPPER — positioned wherever user taps */
    #pizza-wrap {
      position: fixed;
      z-index: 20;
      display: none;
      /* perspective makes rotateX look like 3D depth */
      perspective: 500px;
      perspective-origin: 50% 0%;
      transform: translate(-50%, -50%);
    }

    /* PIZZA IMAGE — rotateX makes it look flat on the table */
    #pizza-img {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      transform: rotateX(65deg);
      transform-origin: center center;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
      transition: opacity 0.3s;
    }

  </style>
</head>
<body>

  <!-- ── START SCREEN ── -->
  <div id="start-screen">
    <div class="emoji">🍕</div>
    <h1>Pizza AR Menu</h1>
    <p>Point your camera at the table<br>and tap to place a pizza</p>
    <button id="start-btn" onclick="startCamera()">Open Camera</button>
  </div>

  <!-- ── LIVE CAMERA ── -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- ── UI ELEMENTS (shown after camera starts) ── -->
  <div id="pizza-label">BBQ Chicken Pizza</div>
  <div id="ingredients">BBQ sauce · Chicken · Olives · Bell peppers · Mozzarella</div>
  <div id="instructions">👆 Tap the table to place the pizza</div>
  <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>

  <!-- ── PIZZA IMAGE ── -->
  <div id="pizza-wrap">
    <img id="pizza-img" src="images/bbq-chicken.png" alt="pizza" />
  </div>

  <script>

    // ── Pizza menu data ────────────────────────────────────
    const pizzas = [
      {
        name:        "BBQ Chicken Pizza",
        image:       "images/bbq-chicken.png",
        ingredients: "BBQ sauce · Chicken · Olives · Bell peppers · Mozzarella"
      },
      {
        name:        "Pepperoni Pizza",
        image:       "images/pepperoni.png",
        ingredients: "Tomato sauce · Pepperoni · Mozzarella · Oregano · Basil"
      },
      {
        name:        "Margherita Pizza",
        image:       "images/margherita.png",
        ingredients: "Tomato sauce · Fresh mozzarella · Basil · Olive oil"
      }
    ];

    let currentIndex = 0;
    let pizzaPlaced  = false;

    // ── DOM references ─────────────────────────────────────
    const cameraEl      = document.getElementById("camera");
    const startScreen   = document.getElementById("start-screen");
    const pizzaWrap     = document.getElementById("pizza-wrap");
    const pizzaImg      = document.getElementById("pizza-img");
    const labelEl       = document.getElementById("pizza-label");
    const ingEl         = document.getElementById("ingredients");
    const instrEl       = document.getElementById("instructions");
    const switchBtn     = document.getElementById("switch-btn");

    // ── STEP 1: Open camera ────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },  // back camera
            width:      { ideal: 1280 },
            height:     { ideal: 720  }
          },
          audio: false
        });

        cameraEl.srcObject = stream;
        await cameraEl.play();

        // Hide start screen, show UI
        startScreen.style.display   = "none";
        labelEl.style.display       = "block";
        ingEl.style.display         = "block";
        instrEl.style.display       = "block";
        switchBtn.style.display     = "block";

      } catch (err) {
        document.getElementById("start-screen").innerHTML =
          "<div style='color:white; padding:30px; text-align:center; line-height:2'>" +
          "<div style='font-size:40px'>❌</div>" +
          "<b>Camera access was blocked</b><br><br>" +
          "On iPhone: go to<br><b>Settings → Safari → Camera</b><br>and set it to <b>Allow</b><br><br>" +
          "Then reload this page." +
          "</div>";
      }
    }

    // ── STEP 2: Tap to place pizza ─────────────────────────
    //
    // HOW THE FLAT LOOK WORKS:
    // rotateX(65deg) tilts the image backward — like looking at
    // a circle on the floor from above. The perspective CSS makes
    // it look 3D. The phone's physical tilt (deviceorientation)
    // adjusts the angle automatically so it always looks right.

    function placePizza(x, y) {
      pizzaWrap.style.left    = x + "px";
      pizzaWrap.style.top     = y + "px";
      pizzaWrap.style.display = "block";

      if (!pizzaPlaced) {
        pizzaPlaced = true;
        instrEl.textContent = "Tap to move  ·  Pinch to resize";
      }
    }

    // Touch (phone)
    document.addEventListener("touchstart", function(e) {
      if (e.target.closest("button")) return;
      if (startScreen.style.display !== "none") return;
      const t = e.touches[0];
      placePizza(t.clientX, t.clientY);
    }, { passive: true });

    // Click (desktop testing)
    document.addEventListener("click", function(e) {
      if (e.target.closest("button")) return;
      if (startScreen.style.display !== "none") return;
      placePizza(e.clientX, e.clientY);
    });

    // ── STEP 3: Auto-adjust tilt to match phone angle ──────
    // When you hold phone flat = pizza looks very flat (high rotateX)
    // When you hold phone upright = pizza looks more upright (lower rotateX)

    window.addEventListener("deviceorientation", function(e) {
      if (e.beta === null) return;
      // beta: 0 = face up, 90 = upright, 135+ = angled toward floor
      // Map beta range 70–150 to rotateX range 45–80 degrees
      const beta    = Math.min(Math.max(e.beta, 70), 150);
      const rotateX = 45 + ((beta - 70) / 80) * 35;
      pizzaImg.style.transform = "rotateX(" + rotateX.toFixed(1) + "deg)";
    }, true);

    // ── STEP 4: Switch pizza ───────────────────────────────
    function switchPizza() {
      currentIndex = (currentIndex + 1) % pizzas.length;
      const p = pizzas[currentIndex];

      // Fade out → swap → fade in
      pizzaImg.style.opacity = "0";
      setTimeout(() => {
        pizzaImg.src        = p.image;
        labelEl.textContent = p.name;
        ingEl.textContent   = p.ingredients;
        pizzaImg.style.opacity = "1";
      }, 300);
    }

    // ── STEP 5: Pinch to resize ────────────────────────────
    let lastPinchDist = null;
    let currentSize   = 240;

    document.addEventListener("touchmove", function(e) {
      if (e.touches.length === 2) {
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (lastPinchDist !== null) {
          const ratio = dist / lastPinchDist;
          currentSize = Math.min(Math.max(currentSize * ratio, 80), 500);
          pizzaImg.style.width  = currentSize + "px";
          pizzaImg.style.height = currentSize + "px";
        }
        lastPinchDist = dist;
      }
    }, { passive: true });

    document.addEventListener("touchend", function(e) {
      if (e.touches.length < 2) lastPinchDist = null;
    }, { passive: true });

  </script>
</body>
</html>
