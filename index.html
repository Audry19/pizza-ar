<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pizza AR Menu</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }

      #pizza-label {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.78);
        color: white;
        padding: 10px 28px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        z-index: 999;
        white-space: nowrap;
      }

      #instructions {
        position: fixed;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.72);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 15px;
        z-index: 999;
        pointer-events: none;
        text-align: center;
        width: 82%;
        line-height: 1.5;
      }

      #switch-btn {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #e63946;
        color: white;
        border: none;
        padding: 16px 40px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        z-index: 999;
      }

      #debug {
        position: fixed;
        top: 16px;
        left: 8px;
        right: 8px;
        background: rgba(0,0,0,0.85);
        color: #00ff88;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 11px;
        z-index: 999;
        pointer-events: none;
        line-height: 1.9;
      }
    </style>
  </head>

  <body>
    <div id="pizza-label">BBQ Chicken Pizza</div>
    <div id="debug">🔄 Loading...</div>
    <div id="instructions">👇 Point at the table then tap to place pizza</div>
    <button id="switch-btn" onclick="switchPizza()">Switch Pizza ↺</button>

    <a-scene
      embedded
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
    >
      <a-assets timeout="20000">
        <img id="img-bbq"        src="images/bbq-chicken.png"  crossorigin="anonymous" />
        <img id="img-pepperoni"  src="images/pepperoni.png"    crossorigin="anonymous" />
        <img id="img-margherita" src="images/margherita.png"   crossorigin="anonymous" />
      </a-assets>

      <!--
        THE KEY TECHNIQUE:
        The pizza plane is a CHILD of the camera.
        position="0 -0.4 -0.8" means:
          0    = centred left/right
         -0.4  = 0.4m BELOW the camera (so it appears on the table surface)
         -0.8  = 0.8m IN FRONT of the camera (negative Z = forward in A-Frame)

        Because it is attached to the camera, it ALWAYS appears
        in the same spot on screen no matter how you tilt or rotate.
        When the user taps, we detach it and freeze it in world space.
      -->
      <a-camera id="main-camera" look-controls-enabled="false">

        <!-- Preview disc — red circle attached to camera so always visible -->
        <a-cylinder
          id="preview-disc"
          color="#FF0000"
          radius="0.25"
          height="0.01"
          position="0 -0.4 -0.8"
          visible="true"
          opacity="0.7"
        ></a-cylinder>

        <!-- Preview pizza image — follows camera -->
        <a-plane
          id="preview-plane"
          src="#img-bbq"
          width="0.5"
          height="0.5"
          rotation="-90 0 0"
          position="0 -0.4 -0.8"
          visible="false"
          material="transparent: true; alphaTest: 0.1; side: double; shader: flat;"
        ></a-plane>

      </a-camera>

      <!-- Placed disc — frozen in world space after tap -->
      <a-cylinder
        id="placed-disc"
        color="#FF0000"
        radius="0.25"
        height="0.01"
        visible="false"
      ></a-cylinder>

      <!-- Placed pizza — frozen in world space after tap -->
      <a-plane
        id="placed-plane"
        width="0.5"
        height="0.5"
        rotation="-90 0 0"
        visible="false"
        material="transparent: true; alphaTest: 0.1; side: double; shader: flat;"
      ></a-plane>

    </a-scene>

    <script>

      // ── Debug helpers ─────────────────────────────────────
      const debugEl = document.getElementById("debug");
      function setLog(msg) { debugEl.innerHTML = msg; }
      function log(msg)    { debugEl.innerHTML += "<br>" + msg; }

      // ── Track image loading ───────────────────────────────
      let loadedCount = 0;
      document.querySelectorAll("a-assets img").forEach(img => {
        const name = img.src.split("/").pop();
        img.addEventListener("load",  () => { loadedCount++; log("✅ " + name); });
        img.addEventListener("error", () => log("❌ MISSING: " + name));
      });

      document.querySelector("a-scene").addEventListener("loaded", () => {
        setLog("✅ Scene ready | " + loadedCount + "/3 images loaded");
        log("🔴 Red circle preview = attached to your camera");
        log("👇 Point at table, then tap to freeze it there");
      });

      // ── Elements ──────────────────────────────────────────
      const previewDisc  = document.getElementById("preview-disc");
      const previewPlane = document.getElementById("preview-plane");
      const placedDisc   = document.getElementById("placed-disc");
      const placedPlane  = document.getElementById("placed-plane");
      const instr        = document.getElementById("instructions");
      const label        = document.getElementById("pizza-label");

      let placed       = false;
      let showingImage = false; // false = show test disc, true = show pizza image

      // ── Tap to freeze pizza in place ──────────────────────
      //
      // HOW THIS WORKS:
      // 1. Before tap: red disc/pizza follows the camera (child of camera)
      // 2. On tap: read the world position of the preview using Three.js
      // 3. Copy that world position onto the placed object (not child of camera)
      // 4. Hide the preview, show the placed version — now frozen on table

      function handleTap(e) {
        if (e.target.closest("button")) return;

        // Get the REAL world position of the preview disc
        // getWorldPosition() gives us where it actually is in 3D space
        const worldPos = new THREE.Vector3();
        previewDisc.object3D.getWorldPosition(worldPos);

        log("📍 Freezing at world pos: " +
            worldPos.x.toFixed(2) + ", " +
            worldPos.y.toFixed(2) + ", " +
            worldPos.z.toFixed(2));

        // Copy world position to the placed objects
        placedDisc.setAttribute("position",  worldPos);
        placedPlane.setAttribute("position", worldPos);

        // Show placed version, hide preview
        placedDisc.setAttribute("visible",   !showingImage);
        placedPlane.setAttribute("visible",  showingImage);

        // Hide the camera-attached preview
        previewDisc.setAttribute("visible",  false);
        previewPlane.setAttribute("visible", false);

        placed = true;
        instr.textContent = "🔴 Can you see the red circle on the table?";
        log("✅ Placed! Can you see the red disc?");
      }

      document.addEventListener("touchend", handleTap, { passive: true });
      document.addEventListener("click",    handleTap);

      // ── Switch pizza ──────────────────────────────────────
      const pizzas = [
        { name: "BBQ Chicken Pizza",  id: "#img-bbq"        },
        { name: "Pepperoni Pizza",    id: "#img-pepperoni"  },
        { name: "Margherita Pizza",   id: "#img-margherita" }
      ];
      let pizzaIndex = 0;

      function switchPizza() {
        pizzaIndex = (pizzaIndex + 1) % pizzas.length;
        const p = pizzas[pizzaIndex];

        // Update both preview and placed
        previewPlane.setAttribute("src", p.id);
        placedPlane.setAttribute("src",  p.id);
        label.textContent = p.name;
        log("🍕 → " + p.name);
      }

      // ── Toggle test disc / pizza image (tap label to switch) ─
      document.getElementById("pizza-label").addEventListener("click", () => {
        showingImage = !showingImage;

        if (!placed) {
          // Toggle preview mode
          previewDisc.setAttribute("visible",  !showingImage);
          previewPlane.setAttribute("visible", showingImage);
        } else {
          // Toggle placed mode
          placedDisc.setAttribute("visible",   !showingImage);
          placedPlane.setAttribute("visible",  showingImage);
        }

        log(showingImage ? "🍕 Showing pizza image" : "🔴 Showing test disc");
      });

      // ── Pinch to resize ───────────────────────────────────
      let lastPinch = null;
      document.addEventListener("touchmove", e => {
        if (e.touches.length === 2) {
          const dx   = e.touches[0].clientX - e.touches[1].clientX;
          const dy   = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (lastPinch) {
            const ratio = dist / lastPinch;
            const target = placed ? placedDisc : previewDisc;
            const cur    = target.getAttribute("scale") || {x:1,y:1,z:1};
            const s      = Math.min(Math.max(cur.x * ratio, 0.1), 8);
            placedDisc.setAttribute("scale",   {x:s, y:s, z:s});
            placedPlane.setAttribute("scale",  {x:s, y:s, z:s});
            previewDisc.setAttribute("scale",  {x:s, y:s, z:s});
            previewPlane.setAttribute("scale", {x:s, y:s, z:s});
          }
          lastPinch = dist;
        }
      }, { passive: true });

      document.addEventListener("touchend", e => {
        if (e.touches.length < 2) lastPinch = null;
      }, { passive: true });

    </script>
  </body>
</html>
